<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Action Camera Drain">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0B1220"/>
      <stop offset="1" stop-color="#1E3A8A"/>
    </linearGradient>
    <linearGradient id="drop" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#67E8F9"/>
      <stop offset="1" stop-color="#0EA5E9"/>
    </linearGradient>
    <linearGradient id="iris" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#22D3EE"/>
      <stop offset="1" stop-color="#0369A1"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.4" cy="0.35" r="0.6">
      <stop offset="0" stop-color="#ECFEFF" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#ECFEFF" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Subtle aperture "sweep" lines hinting recording rings -->
  <g stroke="#1D4ED8" stroke-width="1.5" fill="none" opacity="0.45">
    <circle cx="256" cy="304" r="184"/>
    <circle cx="256" cy="304" r="148"/>
  </g>

  <!-- Teardrop = lens + drain (double meaning) -->
  <path d="
    M 256 96
    C 312 198, 376 256, 376 332
    a 120 120 0 0 1 -240 0
    C 136 256, 200 198, 256 96
    Z
  " fill="url(#drop)"/>

  <!-- Iris -->
  <circle cx="256" cy="332" r="64" fill="#0B1220"/>
  <circle cx="256" cy="332" r="48" fill="url(#iris)"/>
  <circle cx="256" cy="332" r="22" fill="#0B1220"/>

  <!-- Specular highlight -->
  <ellipse cx="232" cy="306" rx="20" ry="14" fill="url(#glow)"/>

  <!-- Tiny drip below — emphasis on "Drain" -->
  <circle cx="256" cy="448" r="10" fill="#22D3EE" opacity="0.9"/>
</svg>
