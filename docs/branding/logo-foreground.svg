<!-- Android adaptive icon foreground (108dp / 432px content area).
     Place on top of the matching ic_launcher_background.xml/png.
     Safe zone: central 264px circle stays visible across all device masks. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 432 432">
  <defs>
    <linearGradient id="drop" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#67E8F9"/>
      <stop offset="1" stop-color="#0EA5E9"/>
    </linearGradient>
    <linearGradient id="iris" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#22D3EE"/>
      <stop offset="1" stop-color="#0369A1"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.4" cy="0.35" r="0.6">
      <stop offset="0" stop-color="#ECFEFF" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#ECFEFF" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Foreground is drawn at 432×432 but only the centre 264×264 is guaranteed visible -->
  <g transform="translate(-40 -40) scale(1.0)">
    <path d="
      M 256 96
      C 312 198, 376 256, 376 332
      a 120 120 0 0 1 -240 0
      C 136 256, 200 198, 256 96
      Z
    " fill="url(#drop)"/>
    <circle cx="256" cy="332" r="64" fill="#0B1220"/>
    <circle cx="256" cy="332" r="48" fill="url(#iris)"/>
    <circle cx="256" cy="332" r="22" fill="#0B1220"/>
    <ellipse cx="232" cy="306" rx="20" ry="14" fill="url(#glow)"/>
  </g>
</svg>
